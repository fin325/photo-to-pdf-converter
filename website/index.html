<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        body {
            background: transparent; 
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding-top: 15px;
            color: white;
            overflow: hidden;
        }
        .container {
            width: 100%;
            max-width: 450px;
            text-align: center;
        }
        h1 {
            font-size: 26px;
            font-weight: 800;
            white-space: nowrap;
            letter-spacing: -0.5px;
            margin-bottom: 5px;
            color: #ffffff;
            text-shadow: 0 2px 10px rgba(0,0,0,0.3);
        }
        .subtitle {
            font-size: 13px;
            opacity: 0.6;
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }
        @media (max-width: 380px) { h1 { font-size: 22px; } }
    </style>
</head>
<body>
    <div class="container">
        <h1>📄 Foto to PDF | Finevych A.</h1>
        <div class="subtitle">БЫСТРЫЙ И БЕЗОПАСНЫЙ КОНВЕРТЕР</div>
    </div>
</body>
</html>
