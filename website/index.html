<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Foto to PDF | Finevych A.</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            /* Изменено: прижимаем к верху вместо центра */
            align-items: flex-start; 
            background: #0f172a;
            overflow-x: hidden;
            /* Регулируйте этот отступ, чтобы поднять/опустить карточку */
            padding-top: 20px; 
        }

        /* Фоновое изображение */
        .background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url("https://images.unsplash.com/photo-1498050108023-c5249f4df085?auto=format&fit=crop&q=80") center/cover no-repeat;
            filter: blur(15px) brightness(0.6);
            z-index: -1;
            transform: scale(1.1);
        }

        .card {
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            background: rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 40px;
            width: 95%; /* Чуть увеличил для мобильных */
            max-width: 420px;
            text-align: center;
            color: white;
            box-shadow: 0 20px 50px rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.15);
            animation: fadeIn 0.8s ease-out;
            /* Убираем лишние внешние отступы, если они были */
            margin-bottom: 20px; 
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 {
            font-size: 26px;
            font-weight: 700;
            margin-bottom: 10px;
            letter-spacing: -0.5px;
            line-height: 1.2;
        }

        p {
            font-size: 16px;
            opacity: 0.7;
            margin-bottom: 35px;
            font-weight: 300;
        }

        .btn-link {
            text-decoration: none;
        }

        .btn {
            width: 100%;
            padding: 16px;
            border-radius: 16px;
            border: none;
            cursor: pointer;
            background: #4A90E2;
            color: white;
            font-size: 18px;
            font-weight: 600;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 10px 20px rgba(74, 144, 226, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn:hover {
            background: #357ABD;
            transform: translateY(-3px);
            box-shadow: 0 15px 25px rgba(74, 144, 226, 0.4);
        }

        .btn:active {
            transform: scale(0.98);
        }

        .footer-text {
            margin-top: 25px;
            font-size: 12px;
            opacity: 0.5;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        @media (max-width: 480px) {
            .card {
                padding: 30px 20px;
            }
            h1 {
                font-size: 22px;
            }
        }
    </style>
</head>
<body>

<div class="background"></div>

<div class="card">
    <h1>📄 Foto to PDF<br>von Finevych A.</h1>
    <p>Профессиональный инструмент для быстрой конвертации ваших фото в PDF документы</p>

    <a href="https://your-app.streamlit.app" class="btn-link" target="_blank">
        <button class="btn">
            <span>🚀 Начать работу</span>
        </button>
    </a>

    <div class="footer-text">Secure & Fast Converter</div>
</div>

</body>
</html>
