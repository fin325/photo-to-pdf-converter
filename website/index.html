<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Foto to PDF | Finevych A.</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            /* Прозрачный фон, чтобы сливаться с темным фоном Streamlit */
            background: transparent; 
            display: flex;
            justify-content: center;
            align-items: flex-start; /* Подтягиваем всё к верху */
            padding-top: 10px; /* Минимальный отступ сверху */
            color: white;
            overflow: hidden;
        }

        .container {
            width: 100%;
            max-width: 450px;
            text-align: center;
            padding: 0 15px;
            animation: fadeIn 0.6s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Заголовок строго в одну строку */
        h1 {
            font-size: 24px;
            font-weight: 800;
            white-space: nowrap; /* Запрещает перенос строки */
            letter-spacing: -0.5px;
            margin-bottom: 5px;
            color: #ffffff;
        }

        .subtitle {
            font-size: 13px;
            opacity: 0.6;
            margin-bottom: 25px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* КРАСИВАЯ КНОПКА ЗАГРУЗКИ */
        .upload-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%);
            border: 2px dashed rgba(255, 255, 255, 0.5);
            border-radius: 20px;
            padding: 25px 20px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 10px 30px rgba(37, 99, 235, 0.3);
            text-decoration: none;
            color: white;
        }

        .upload-area:hover {
            transform: translateY(-3px);
            background: linear-gradient(135deg, #60a5fa 0%, #2563eb 100%);
            border-color: #ffffff;
            box-shadow: 0 15px 40px rgba(37, 99, 235, 0.5);
        }

        .upload-area:active {
            transform: scale(0.98);
        }

        .upload-icon {
            font-size: 36px;
            margin-bottom: 12px;
            line-height: 1;
        }

        .upload-title {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .upload-desc {
            font-size: 13px;
            opacity: 0.8;
            font-weight: 300;
        }

        /* Адаптация заголовка для очень узких экранов (например, старых iPhone) */
        @media (max-width: 380px) {
            h1 { font-size: 20px; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>📄 Foto to PDF | Finevych A.</h1>
    <div class="subtitle">Secure & Fast Converter</div>

    <a href="#root" class="upload-area">
        <div class="upload-icon">☁️</div>
        <div class="upload-title">ЗАГРУЗИТЬ ФАЙЛЫ</div>
        <div class="upload-desc">Нажмите, чтобы выбрать JPG или PNG</div>
    </a>
</div>

</body>
</html>
