<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Foto to PDF | Finevych A.</title>

    <style>
        /* Grundlegende Stile zurücksetzen / Сброс базовых стилей / Reset basic styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        /* Seitenlayout / Макет страницы / Page layout */
        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #0f172a; /* Dunkler Fallback-Hintergrund / Тёмный запасной фон / Dark fallback background */
            overflow: hidden;
        }

        /* Hintergrundbild mit Weichzeichner / Фоновое изображение с размытием / Background image with blur */
        .background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url("https://images.unsplash.com/photo-1498050108023-c5249f4df085?auto=format&fit=crop&q=80") center/cover no-repeat;
            filter: blur(15px) brightness(0.6);
            z-index: -1;
            transform: scale(1.1); /* Weiße Ränder beim Weichzeichnen entfernen / Убирает белые края при размытии / Removes white edges when blurring */
        }

        /* Glasmorphismus-Karte / Карточка со стеклянным эффектом / Glassmorphism card */
        .card {
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            background: rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 40px;
            width: 90%;
            max-width: 420px;
            text-align: center;
            color: white;
            box-shadow: 0 20px 50px rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.15);
            animation: fadeIn 0.8s ease-out;
        }

        /* Einblendanimation / Анимация появления / Fade-in animation */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Titelstil / Стиль заголовка / Title style */
        h1 {
            font-size: 26px;
            font-weight: 700;
            margin-bottom: 10px;
            letter-spacing: -0.5px;
            line-height: 1.2;
        }

        /* Untertitelstil / Стиль подзаголовка / Subtitle style */
        p {
            font-size: 16px;
            opacity: 0.7;
            margin-bottom: 35px;
            font-weight: 300;
        }

        /* Link-Dekoration entfernen / Убираем декорацию ссылки / Remove link decoration */
        .btn-link {
            text-decoration: none;
        }

        /* Hauptschaltfläche / Основная кнопка / Main button */
        .btn {
            width: 100%;
            padding: 16px;
            border-radius: 16px;
            border: none;
            cursor: pointer;
            background: #4A90E2; /* Blau passend zum Streamlit-Stil / Синий как в Streamlit / Blue matching Streamlit style */
            color: white;
            font-size: 18px;
            font-weight: 600;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 10px 20px rgba(74, 144, 226, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        /* Hover-Effekt der Schaltfläche / Эффект наведения кнопки / Button hover effect */
        .btn:hover {
            background: #357ABD;
            transform: translateY(-3px);
            box-shadow: 0 15px 25px rgba(74, 144, 226, 0.4);
        }

        /* Klick-Effekt der Schaltfläche / Эффект нажатия кнопки / Button click effect */
        .btn:active {
            transform: scale(0.98);
        }

        /* Fußzeilentext / Текст подвала / Footer text */
        .footer-text {
            margin-top: 25px;
            font-size: 12px;
            opacity: 0.5;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Anpassung für mobile Geräte / Адаптация для мобильных / Mobile adaptation */
        @media (max-width: 480px) {
            .card {
                padding: 30px 20px;
            }
            h1 {
                font-size: 22px;
            }
        }
    </style>
</head>
<body>

<!-- Hintergrundbild / Фоновое изображение / Background image -->
<div class="background"></div>

<!-- Hauptkarte / Основная карточка / Main card -->
<div class="card">
    <h1>📄 Foto to PDF<br>von Finevych A.</h1>
    <p>Professionelles Werkzeug zur schnellen Konvertierung Ihrer Fotos in PDF-Dokumente</p>

    <!-- Link zur Streamlit-App / Ссылка на приложение Streamlit / Link to Streamlit app -->
    <a href="https://your-app.streamlit.app" class="btn-link" target="_blank">
        <button class="btn">
            <span>🚀 Jetzt starten</span>
        </button>
    </a>

    <div class="footer-text">Secure & Fast Converter</div>
</div>

</body>
</html>
